name: "Build & Push Docker Images to Docker Hub"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Docker Buildx 설정 (멀티 플랫폼 빌드 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Spring Boot Hello World 이미지 빌드 & 푸시
      - name: Build and push Spring Boot image
        uses: docker/build-push-action@v5
        with:
          context: ./spring-boot-app
          push: ${{ github.event_name == 'push' }}
          tags: edumgt/spring-hello:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Node.js Hello World 이미지 빌드 & 푸시
      - name: Build and push Node.js image
        uses: docker/build-push-action@v5
        with:
          context: ./node-app
          push: ${{ github.event_name == 'push' }}
          tags: edumgt/node-hello:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Python FastAPI Hello World 이미지 빌드 & 푸시
      - name: Build and push Python FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./python-app
          push: ${{ github.event_name == 'push' }}
          tags: edumgt/python-hello:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
